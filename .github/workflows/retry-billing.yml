name: Retry Overage Billing

on:
  schedule:
    # Daily at 9am UTC. Sweeps any overage postcard that didn't meter at
    # dispatch time (transient Stripe failure). Idempotent — safe to run daily.
    - cron: '0 9 * * *'
  workflow_dispatch: # Allow manual trigger from the GitHub Actions UI

jobs:
  retry-billing:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Retry unbilled overage
        run: npx tsx scripts/run-retry-billing.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_METER_EVENT_NAME: ${{ secrets.STRIPE_METER_EVENT_NAME }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
