name: Supabase Keep-Alive

on:
  schedule:
    # Every 3 days at 07:00 UTC. The free-tier pause kicks in after 7 days
    # idle, so a ping every 3 days keeps a comfortable margin.
    - cron: '0 7 */3 * *'
  workflow_dispatch: # Allow manual trigger from the Actions UI

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Ping Supabase
        run: npx tsx scripts/keep-alive.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
