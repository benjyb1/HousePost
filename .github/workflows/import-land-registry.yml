name: Import Land Registry Data

on:
  schedule:
    # Runs on 21st, 22nd, 23rd at 6am UTC.
    # The script's isScheduledRunDay(21) handles weekend deferral logic
    # so only the correct day will actually execute the import.
    - cron: '0 6 21,22,23 * *'
  workflow_dispatch: # Allow manual trigger from GitHub Actions UI

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Land Registry import
        run: npx tsx scripts/run-import.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LAND_REGISTRY_CSV_URL: ${{ secrets.LAND_REGISTRY_CSV_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
